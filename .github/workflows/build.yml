name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  merge_group:
  workflow_dispatch:
  issue_comment:
    types: [ created ]
  pull_request_target:
    types: [ opened, closed, synchronize ]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  build:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: "recursive"
          fetch-depth: 0

      - name: Accept NDK license
        run: echo "y" | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "ndk;29.0.13113456"

      - name: Build
        run: |
          make release -j$(nproc)
          make debug -j$(nproc)

      - name: Upload release
        uses: actions/upload-artifact@v7
        with:
          path: "build/out/ReZygisk-v*-release.zip"
          archive: false

      - name: Upload debug
        uses: actions/upload-artifact@v7
        with:
          path: "build/out/ReZygisk-v*-debug.zip"
          archive: false

  cla:
    if: github.event_name == 'issue_comment' || github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERFORMANC_BOT_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/ReZygisk/cla.json'
          path-to-document: 'https://github.com/PerformanC/contributing/blob/main/CLA.md'
          branch: 'main'
          remote-organization-name: 'PerformanC'
          remote-repository-name: 'CLA-Signatures'
          create-file-commit-message: 'add: file for storing CLA Signatures'
          signed-commit-message: 'add: @$contributorName to the list of signed contributors in $owner'
          custom-allsigned-prcomment: 'All Contributors have signed the CLA. The PR is now allowed to be merged.'
