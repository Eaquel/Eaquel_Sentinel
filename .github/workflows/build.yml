name: Build

on:
  push:
    branches: [ main ]
  pull_request:
  merge_group:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: "recursive"
          fetch-depth: 0

      - name: Accept NDK license
        run: echo "y" | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "ndk;29.0.13113456"

      - name: Build
        run: make release -j$(nproc)

      - name: Upload release
        uses: actions/upload-artifact@v7
        with:
          name: Eaquel_Sentinel_Release
          path: build/out/Eaquel_Sentinel-v*-release.zip
          if-no-files-found: error
          archive: false
          compression-level: 6
          overwrite: true
